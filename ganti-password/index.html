<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Ruang Statistika — Mengalihkan…</title>
  <style>
    body {
      margin: 0;
      font-family: 'DM Sans', Arial, sans-serif;
      background: linear-gradient(135deg, #0c2340 0%, #185FA5 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .box {
      text-align: center;
      padding: 40px;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: #85b7eb; font-size: 0.9rem; margin: 8px 0 0; }
    a { color: #85b7eb; font-size: 0.8rem; }
  </style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <h2 style="margin:0 0 8px;">Mengalihkan ke Ruang Statistika…</h2>
    <p>Mohon tunggu sebentar.</p>
    <p id="fallback" style="display:none;margin-top:16px;">
      Tidak otomatis dialihkan?
      <a id="manual-link" href="#">Klik di sini</a>
    </p>
  </div>

  <script>
  (function() {
    var APP_URL = 'https://ruang-statistika.streamlit.app/';

    // Baca fragment (#access_token=...&type=recovery&...)
    var hash = window.location.hash.substring(1);

    if (!hash || hash.indexOf('access_token') === -1) {
      // Tidak ada token — redirect ke app biasa
      window.location.replace(APP_URL);
      return;
    }

    // Parse fragment
    var params = new URLSearchParams(hash);
    var at = params.get('access_token') || '';
    var rt = params.get('refresh_token') || '';
    var tp = params.get('type') || '';
    var ea = params.get('expires_at') || '';

    // Bangun URL tujuan dengan token sebagai query string
    var dest = new URL(APP_URL);
    if (at) dest.searchParams.set('access_token', at);
    if (rt) dest.searchParams.set('refresh_token', rt);
    if (tp) dest.searchParams.set('type', tp);
    if (ea) dest.searchParams.set('expires_at', ea);

    // Tampilkan fallback link setelah 2 detik
    setTimeout(function() {
      var fb = document.getElementById('fallback');
      var ml = document.getElementById('manual-link');
      if (fb && ml) {
        ml.href = dest.toString();
        fb.style.display = 'block';
      }
    }, 2000);

    // Redirect
    window.location.replace(dest.toString());
  })();
  </script>
</body>
</html>
